name: 文档 CI 校验

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 Mintlify CLI
        run: npm install -g mintlify@latest

      - name: 校验文档配置
        run: mintlify broken-links
